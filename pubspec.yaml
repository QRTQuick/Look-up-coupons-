name: look_up_coupons
description: Offline-first local deals and coupons app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  sqflite: ^2.3.3
  path: ^1.9.0
  geolocator: ^11.0.0
  google_maps_flutter: ^2.6.1
  flutter_local_notifications: ^17.2.1
  timezone: ^0.9.4
  flutter_timezone: ^3.0.1
  cached_network_image: ^3.4.1
  shared_preferences: ^2.3.2
  permission_handler: ^11.3.1
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/placeholder.png
    - assets/icon/app_icon.png

flutter_icons:
  android: true
  ios: false
  image_path: assets/icon/app_icon.png
  adaptive_icon_background: "#0B3D91"
  adaptive_icon_foreground: assets/icon/app_icon.png
